<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | FORMES</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #cc0000; margin-bottom: 10px; }
        p { line-height: 1.6; color: #666; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #003d7a;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #00264d; }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>403</h1>
        <h3>Directory Access Restricted</h3>
        <p>Direct access to the FORMES data directory is not permitted. Please return to the homepage to view our research.</p>
        <a href="../index.html" class="btn">Return Home</a>
    </div>

</body>
</html>
